<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Intercepted - check before you snack</title>
  <meta name="description" content="A ten-second check-in that helps you catch impulsive snacking before it happens. No calorie counting, no shame. iOS, coming soon." />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Intercepted - check before you snack" />
  <meta property="og:description" content="A ten-second check-in that helps you catch impulsive snacking before it happens. No calorie counting, no shame. iOS, coming soon." />
  <meta property="og:url" content="https://intercepted.app" />
  <meta property="og:image" content="https://intercepted.app/assets/icon-1024.png" />
  <meta name="twitter:card" content="summary" />

  <!-- Favicon: the app icon (green tile, white arrow) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14.3' fill='%230DBE76'/%3E%3Cg transform='translate(14.45 13.71) scale(1.4933)' fill='none' stroke='%23FFFFFF' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M8.5 18.5 L16 12.5 L7.5 6'/%3E%3Cpath d='M11.9 6.7 L7.5 6 L9.4 10.1'/%3E%3C/g%3E%3C/svg%3E" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png" />
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />

  <!-- Space Grotesk -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #FFFFFF;
      --surface: #F6F7F6;
      --text: #1A1C1A;
      --muted: #5B635C;
      --border: #E4E7E4;
      --accent: #0DBE76;
      --accent-strong: #0AA968;
      --accent-tint: rgba(13, 190, 118, 0.12);
      --glow: rgba(13, 190, 118, 0.28);
      --on-accent: #FFFFFF;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #16181C;
        --surface: #1E2127;
        --text: #F3F5F3;
        --muted: #9AA39B;
        --border: #2A2E35;
        --accent: #13CE86;
        --accent-strong: #2BD897;
        --accent-tint: rgba(19, 206, 134, 0.16);
        --glow: rgba(19, 206, 134, 0.30);
        --on-accent: #0B0D10;
      }
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: "Space Grotesk", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      line-height: 1.5;
    }

    .page {
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* Nav */
    .nav {
      position: absolute;
      top: 0;
      left: 0;
      display: flex;
      align-items: center;
      gap: 0.25rem;
      padding: 1.6rem clamp(1.25rem, 5vw, 3rem);
    }
    .nav .mark { width: 28px; height: 28px; }
    .wordmark {
      font-weight: 600;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    /* Main hero */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem clamp(1.25rem, 5vw, 3rem) 3rem;
    }

    .glyph-wrap {
      position: relative;
      width: 104px;
      height: 104px;
      display: grid;
      place-items: center;
      margin-bottom: 2.2rem;
    }
    .glyph-wrap::before {
      content: "";
      position: absolute;
      inset: -28%;
      background: radial-gradient(closest-side, var(--glow), transparent 72%);
      filter: blur(6px);
      z-index: 0;
    }
    .glyph-wrap .tile {
      position: relative;
      z-index: 1;
      width: 88px;
      height: 88px;
      border-radius: 20px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--accent-strong);
      background: var(--accent-tint);
      border: 1px solid var(--accent);
      padding: 0.5rem 1.1rem;
      border-radius: 999px;
      margin-bottom: 1.6rem;
    }
    .badge .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }

    h1 {
      font-size: clamp(2.4rem, 6vw, 3.6rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.05;
      margin: 0 0 1rem;
      max-width: 14ch;
    }

    .subhead {
      font-size: clamp(1.05rem, 2.2vw, 1.25rem);
      color: var(--muted);
      max-width: 46ch;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav" aria-label="Primary">
      <svg class="mark" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M8.5 18.5 L16 12.5 L7.5 6" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M11.9 6.7 L7.5 6 L9.4 10.1" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="wordmark">Intercepted</span>
    </nav>

    <main>
      <div class="glyph-wrap">
        <svg class="tile" viewBox="0 0 64 64" aria-label="Intercepted">
          <rect width="64" height="64" rx="14.3" fill="#0DBE76"/>
          <g transform="translate(14.45 13.71) scale(1.4933)" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8.5 18.5 L16 12.5 L7.5 6"/>
            <path d="M11.9 6.7 L7.5 6 L9.4 10.1"/>
          </g>
        </svg>
      </div>

      <span class="badge"><span class="dot"></span>Coming soon to iOS</span>
      <h1>Check before you snack.</h1>
      <p class="subhead">Most snacking runs on impulse, not hunger. Intercepted is a ten-second check-in that helps you tell the difference.</p>
    </main>
  </div>
</body>
</html>
